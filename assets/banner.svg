<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="800" height="200" fill="#0d1117" />
  <text x="50%" y="40%" font-family="monospace" font-size="32" fill="#58a6ff" text-anchor="middle" font-weight="bold">
    S O U V I K   B I S W A S
  </text>
  <text x="50%" y="65%" font-family="monospace" font-size="14" fill="#8b949e" text-anchor="middle">
    Full-stack Developer | Open Source Enthusiast | Creative Coder
  </text>
  <line x1="200" y1="80" x2="600" y2="80" stroke="#30363d" stroke-width="2" />
  <text x="50%" y="120%" font-family="monospace" font-size="14" fill="#58a6ff" text-anchor="middle">
    &gt; Initializing profile...
  </text>
  <style>
    @keyframes typing {
      from { width: 0 }
      to { width: 100% }
    }
    .typewriter {
      overflow: hidden;
      white-space: nowrap;
      margin: 0 auto;
      letter-spacing: .15em;
      animation: typing 3.5s steps(40, end), blink-caret .75s step-end infinite;
    }
  </style>
</svg>
